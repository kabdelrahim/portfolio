<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | asalehkarim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Fira Code', monospace; }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen" data-page="contact">
    <div id="header-placeholder"></div>

    <main class="flex-grow pt-32 px-6">
      <section class="max-w-2xl mx-auto">
        <h2 class="text-3xl font-bold text-blue-400 mb-6">Me contacter</h2>
        <p class="text-gray-300 mb-6">
          Pour toute question ou prise de contact, merci de remplir le formulaire ci-dessous. Je vous répondrai dans les plus brefs délais.
        </p>

        <form action="#" method="POST" class="space-y-6">
          <div>
            <label for="name" class="block mb-1 text-sm text-gray-400">Nom</label>
            <input type="text" id="name" name="name" required class="w-full px-4 py-2 rounded bg-gray-800 border border-gray-700 text-white" />
          </div>
          <div>
            <label for="email" class="block mb-1 text-sm text-gray-400">Adresse e-mail</label>
            <input type="email" id="email" name="email" required class="w-full px-4 py-2 rounded bg-gray-800 border border-gray-700 text-white" />
          </div>
          <div>
            <label for="message" class="block mb-1 text-sm text-gray-400">Message</label>
            <textarea id="message" name="message" rows="5" required class="w-full px-4 py-2 rounded bg-gray-800 border border-gray-700 text-white"></textarea>
          </div>
          <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded">Envoyer</button>
        </form>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/components.js"></script>
  </body>
</html>
